<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="msapplication-TileColor" content="#7c3aed" />
    
    <!-- SEO -->
    <title>Kamzi — Connect. Chat. Be You.</title>
    <meta name="description" content="AI-powered messaging with end-to-end encryption, context-aware chats, vibe status, voice rooms, and disappearing messages." />
    <meta name="keywords" content="encrypted chat, AI messaging, voice rooms, private messaging, vibe status, Kamzi" />
    <meta name="author" content="Kamzi" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/kamzi-icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/kamzi-icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/kamzi-icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/kamzi-icon-152.png" />
    
    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kamzi" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileImage" content="/icons/kamzi-icon-144.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/kamzi-icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/kamzi-icon-72.png" />
    <link rel="shortcut icon" href="/icons/kamzi-icon-72.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://firebase.googleapis.com" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    
    <!-- Splash screens for iOS -->
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-2048-2732.png" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1668-2388.png" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1536-2048.png" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1125-2436.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-1242-2688.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-828-1792.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-750-1334.png" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-splash-640-1136.png" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kamzi — Connect. Chat. Be You." />
    <meta property="og:description" content="AI-powered messaging with end-to-end encryption, context-aware chats, and vibe status." />
    <meta property="og:image" content="https://kamzi.app/og-image.png" />
    <meta property="og:url" content="https://kamzi.app" />
    <meta property="og:site_name" content="Kamzi" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kamzi — Connect. Chat. Be You." />
    <meta name="twitter:description" content="AI-powered messaging with end-to-end encryption." />
    <meta name="twitter:image" content="https://kamzi.app/og-image.png" />
    
    <!-- Security -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <style>
      /* Critical CSS - prevent FOUC */
      html { background-color: #0a0a0a; }
      body { 
        margin: 0; 
        padding: 0; 
        background-color: #0a0a0a; 
        color: #ffffff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior-y: none;
        -webkit-tap-highlight-color: transparent;
      }
      #root { 
        min-height: 100vh; 
        min-height: 100dvh;
        background-color: #0a0a0a;
      }
      /* Loading spinner */
      .kamzi-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      .kamzi-loader.hidden { opacity: 0; pointer-events: none; }
      .kamzi-loader__spinner {
        width: 48px;
        height: 48px;
        border: 3px solid transparent;
        border-top-color: #7c3aed;
        border-right-color: #14b8a6;
        border-radius: 50%;
        animation: kamzi-spin 0.8s linear infinite;
      }
      @keyframes kamzi-spin {
        to { transform: rotate(360deg); }
      }
      /* Prevent text selection during app feel */
      .no-select {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center; background: #0a0a0a; color: #fff; font-family: Inter, sans-serif;">
        <h1 style="color: #7c3aed; font-size: 1.5rem; margin-bottom: 1rem;">Kamzi needs JavaScript</h1>
        <p>Please enable JavaScript to use Kamzi's encrypted messaging, AI features, and voice rooms.</p>
      </div>
    </noscript>
    
    <!-- Loading state until React mounts -->
    <div id="kamzi-loader" class="kamzi-loader">
      <div className="kamzi-loader__spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Hide loader when React mounts
      window.addEventListener('load', () => {
        const loader = document.getElementById('kamzi-loader');
        if (loader) {
          setTimeout(() => {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 300);
          }, 500);
        }
      });
    </script>
    
    <script type="module" src="/src/index.js"></script>

  </body>
</html>
